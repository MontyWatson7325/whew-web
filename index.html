<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whew — How Close Were You to Never Existing?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e8e4dc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .exhale {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -4px;
      color: #f5f0e8;
      line-height: 1;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: 20px;
      color: #a09890;
      margin-bottom: 48px;
      max-width: 480px;
      line-height: 1.5;
    }
    .coming-soon {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6b6058;
      margin-bottom: 12px;
    }
    .app-store-badge {
      display: inline-block;
      background: #1a1a24;
      color: #e8e4dc;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 15px;
      text-decoration: none;
      margin-top: 8px;
    }
    .privacy-link {
      margin-top: 60px;
      font-size: 13px;
      color: #4a4440;
    }
    .privacy-link a {
      color: #6b6058;
      text-decoration: none;
    }
    .privacy-link a:hover {
      color: #a09890;
    }
  </style>
</head>
<body>
  <div class="exhale">Whew.</div>
  <p class="tagline">How close did your ancestors come to never surviving? Discover the moments that made your existence possible.</p>
  <p class="coming-soon">Coming soon to</p>
  <a class="app-store-badge" href="#">App Store</a>
  <div class="privacy-link">
    <a href="/privacy">Privacy Policy</a>
  </div>
</body>
</html>
